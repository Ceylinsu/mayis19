<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #clickable {
        position: absolute; top: 10px; left: 10px; z-index: 999;
        padding: 15px; background: rgba(0,0,0,0.5); color: white;
        border-radius: 8px; cursor: pointer; font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="clickable">Sistemi Başlatmak İçin Dokun</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="resim_video/19mayis1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.6" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector('#clickable');
      const video = document.querySelector('#arVideo');
      
      startBtn.addEventListener('click', () => {
        video.play();
        video.pause(); // İlk dokunuşta videoyu sisteme tanıtıyoruz
        startBtn.style.display = 'none';
        console.log("Sistem hazır, resmi gösterin.");
      });
    </script>
  </body>
</html>
