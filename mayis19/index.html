<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR Projesi</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* Ekranda belirecek bir başlatma uyarısı (Tarayıcılar tıklamadan video oynatmaz) */
      #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: Arial, sans-serif;
        font-size: 20px;
        text-align: center;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="start-screen">Kamerayı açmak ve AR deneyimine başlamak için ekrana dokunun.</div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="resim_video/19mayis1.mp4" preload="auto" response-type="arraybuffer" loop crossorigin webkit-playsinline playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" position="0 0 0" height="1" width="1.5" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      // Sayfa yüklendiğinde çalışacak kodlar
      document.addEventListener("DOMContentLoaded", function() {
        const target = document.querySelector('[mindar-image-target]');
        const vid = document.querySelector('#vid');
        const startScreen = document.querySelector('#start-screen');

        // Ekrana ilk dokunuşta kamerayı ve videoyu hazırla
        startScreen.addEventListener('click', function () {
          startScreen.style.display = 'none'; // Başlangıç ekranını gizle
          vid.play();  // Videoyu kısa bir süre oynatıp durduruyoruz (Tarayıcı engeline takılmamak için)
          vid.pause();
        });

        // Kamera resmi algıladığında
        target.addEventListener("targetFound", event => {
          console.log("Resim bulundu!");
          vid.play(); // Videoyu başlat
        });

        // Kamera resmi kaybettiğinde
        target.addEventListener("targetLost", event => {
          console.log("Resim kaybedildi.");
          vid.pause(); // Videoyu durdur
        });
      });
    </script>
  </body>
</html>
