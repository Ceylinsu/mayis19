<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR - Hızlı Versiyon</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #startBtn { padding: 20px 40px; font-size: 20px; background: #e74c3c; color: white; border: none; border-radius: 12px; cursor: pointer; display: none; }
        #status { margin-bottom: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay">
        <p id="status">Sistem Yükleniyor...</p>
        <button id="startBtn">DENEYİMİ BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: resim_video/targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
             embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="resim_video/video.mp4" preload="metadata" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" position="0 0 0" height="1" width="1.5"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const video = document.getElementById('arVideo');

        // 1. Sistem hazır olduğunda butonu göster
        sceneEl.addEventListener("arReady", () => {
            status.innerHTML = "Sistem Hazır! ✅";
            startBtn.style.display = "block";
        });

        // 2. Butona basınca kamerayı ve videoyu "ısıt"
        startBtn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = "none";
            sceneEl.systems["mindar-image-system"].start();
            // Android'de videonun hızlı açılması için gizli oynat-dur yapıyoruz
            video.play().then(() => video.pause());
        });

        // 3. Resim bulununca videoyu oynat
        document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
            video.play();
        });

        // Hata kontrolü (15 saniye içinde açılmazsa)
        setTimeout(() => {
            if (startBtn.style.display === "none") {
                status.innerHTML = "Hata: Dosyalar yüklenemedi!<br>GitHub klasör adını (resim_video) ve dosya adını kontrol et.";
                status.style.color = "#ff4444";
            }
        }, 15000);
    </script>
</body>
</html>
