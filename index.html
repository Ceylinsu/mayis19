<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR - Hızlı Çözüm</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        #statusBox { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; z-index: 10000; }
        #startBtn { display: none; padding: 20px 40px; font-size: 18px; background: #e74c3c; color: white; border: none; border-radius: 12px; cursor: pointer; }
        #msg { margin-bottom: 20px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="statusBox">
        <p id="msg">Dosyalar Kontrol Ediliyor...</p>
        <button id="startBtn">KAMERAYI BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: resim_video/targets.mind; autoStart: false; uiLoading: no;" 
             embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="resim_video/video.mp4" preload="metadata" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" position="0 0 0" height="1" width="1.5"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startBtn = document.getElementById('startBtn');
        const msg = document.getElementById('msg');
        const video = document.getElementById('arVideo');

        // DOSYA KONTROLÜ: targets.mind dosyası gerçekten orada mı?
        fetch('resim_video/targets.mind')
            .then(response => {
                if (response.ok) {
                    msg.innerHTML = "Dosyalar bulundu. Sistem Hazır!";
                } else {
                    msg.innerHTML = "<span style='color:red;'>HATA: targets.mind dosyası bulunamadı!</span><br>Klasör veya dosya ismi yanlış.";
                }
            })
            .catch(() => { msg.innerHTML = "Bağlantı hatası!"; });

        // Sistem tamamen yüklendiğinde
        sceneEl.addEventListener("arReady", () => {
            msg.style.display = "none";
            startBtn.style.display = "inline-block";
        });

        startBtn.addEventListener('click', () => {
            document.getElementById('statusBox').style.display = "none";
            sceneEl.systems["mindar-image-system"].start();
            video.play().then(() => video.pause()); // Videoyu önceden ısıt
        });

        document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
            video.play();
        });
    </script>
</body>
</html>
