
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR - Kesin Çözüm</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; }
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; }
        #startBtn { display: none; padding: 20px; background: #e74c3c; color: white; border: none; border-radius: 10px; margin: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="overlay">
        <p id="msg">Sistem Yükleniyor...</p>
        <button id="startBtn">KAMERAYI AÇ</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind; autoStart: false; uiLoading: no;" 
             embedded vr-mode-ui="enabled: false" renderer="preserveDrawingBuffer: true;">
        <a-assets>
            <video id="vid" src="./resim_video/19mayis1.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" position="0 0 0" height="1" width="1.5"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('startBtn');

        // Sistem dosyaları okuduğunda
        scene.addEventListener("arReady", () => {
            msg.innerHTML = "Dosyalar Hazır!";
            btn.style.display = "inline-block";
        });

        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = "none";
            // Sistemi manuel başlatmaya zorla
            scene.systems["mindar-image-system"].start();
        });

        // Resim bulununca videoyu oynat
        document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
            document.getElementById('vid').play();
        });
    </script>
</body>
</html>
