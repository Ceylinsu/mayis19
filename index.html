<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR Projesi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif;}
      /* Yükleme ekranı çubuğu */
      #infoBar {
        position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8);
        color: white; padding: 15px; text-align: center; z-index: 10001; font-size: 16px;
      }
      #startButton, #unmuteButton {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; font-size: 18px; color: white; border: none; border-radius: 10px; z-index: 9999;
      }
      #startButton { background-color: #e74c3c; display: none; } /* Başlangıçta gizli */
      #unmuteButton { display: none; background-color: #27ae60; bottom: 90px; }
    </style>
  </head>
  <body>
    <div id="infoBar">Lütfen Bekleyin... Sistem Yükleniyor.</div>
    <button id="startButton">Kamerayı Başlat</button>
    <button id="unmuteButton">Sesi Aç 🔊</button>

    <a-scene mindar-image="imageTargetSrc: resim_video/targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video-19mayis" src="resim_video/19mayis1.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#video-19mayis" position="0 0 0" height="1" width="1.5"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startButton = document.querySelector('#startButton');
      const unmuteButton = document.querySelector('#unmuteButton');
      const infoBar = document.querySelector('#infoBar');
      const video = document.querySelector('#video-19mayis');

      // 1. Kütüphaneler ve sistem tamamen hazır olduğunda
      sceneEl.addEventListener("arReady", () => {
        infoBar.innerHTML = "Sistem Hazır! Butona Basın.";
        startButton.style.display = "block"; // Başlat butonunu göster
      });

      // 2. Kamera izni verilmezse veya hata çıkarsa
      sceneEl.addEventListener("arError", () => {
        infoBar.innerHTML = "HATA: Kamera başlatılamadı. Lütfen izin verin.";
        infoBar.style.color = "red";
      });

      // 3. Başlat butonuna tıklanınca
      startButton.addEventListener('click', () => {
        sceneEl.systems["mindar-image-system"].start();
        startButton.style.display = 'none';
        infoBar.innerHTML = "Atatürk Resmini Kameraya Gösterin";
      });

      // 4. Kamera resmi bulduğunda
      const targetEntity = document.querySelector('[mindar-image-target]');
      targetEntity.addEventListener("targetFound", () => {
        video.play();
        infoBar.style.display = "none"; // Üstteki yazıyı gizle
        
        // Video sessizse (Apple kuralı) sesi aç butonunu göster
        if(video.muted) {
            unmuteButton.style.display = 'block'; 
        }
      });

      // 5. Kamera resmi kaybettiğinde
      targetEntity.addEventListener("targetLost", () => {
        video.pause();
        unmuteButton.style.display = 'none';
      });

      // 6. Kullanıcı "Sesi Aç" butonuna tıkladığında
      unmuteButton.addEventListener('click', () => {
        video.muted = false;
        unmuteButton.style.display = 'none';
      });
    </script>
  </body>
</html>
